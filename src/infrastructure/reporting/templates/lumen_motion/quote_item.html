{% if quotes %}
<div class="lm-quote-list">
    {% for quote in quotes %}
    <article class="lm-quote-card avoid-break">
        <div class="lm-quote-avatar-wrap">
            {% if quote.avatar_url %}
            <img class="lm-quote-avatar" src="{{ quote.avatar_url }}" alt="{{ quote.sender }}">
            {% elif quote.avatar_data %}
            <img class="lm-quote-avatar" src="{{ quote.avatar_data }}" alt="{{ quote.sender }}">
            {% else %}
            <div class="lm-quote-avatar lm-title-avatar-fallback">ID</div>
            {% endif %}
        </div>
        <div class="lm-quote-content-wrap">
            <div class="lm-quote-mark">“</div>
            <div class="lm-quote-content">{{ quote.content }}</div>
            <div class="lm-quote-sender">—— {{ quote.sender }}</div>
            <div class="lm-quote-reason">{{ quote.reason | safe }}</div>
        </div>
    </article>
    {% endfor %}
</div>
{% endif %}
